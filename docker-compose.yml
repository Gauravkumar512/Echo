name: Echo

services:
  chat-api:
    build: ./chat-api
    container_name: Echo_server
    ports:
      - "8000:8000"
    env_file:
      - ./chat-api/.env
    environment:
      - PORT=8000
      - MONGO_URL=mongodb://chat-mongo:27017/chat-app
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - chat-mongo
    networks:
      - Echo-network

  chat-mongo:
    image: mongo:7
    container_name: chat_mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - Echo-network

volumes:
  mongo_data:

networks:
  Echo-network:
    driver: bridge
